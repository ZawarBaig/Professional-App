name: Build MrBaig Downloader EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp pyinstaller Pillow

    - name: Download and Extract FFmpeg
      shell: powershell
      run: |
        Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
        Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_extracted"
        Copy-Item -Path "ffmpeg_extracted\*\bin\ffmpeg.exe" -Destination ".\ffmpeg.exe"

    - name: Build EXE with PyInstaller
      # Added the --name flag to explicitly name the output executable
      run: |
        pyinstaller --noconsole --onefile --name "MrBaig-Downloader" --icon="icon.ico" --add-data "icon.ico;." --add-binary "ffmpeg.exe;." downloader.py
      
    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MrBaig-Downloader-Windows
        # Updated path to match the newly named executable
        path: dist/MrBaig-Downloader.exe
